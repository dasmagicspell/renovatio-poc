name: renovatio
description: "Renovatio - Your AI-Powered Wellness Companion"
publish_to: 'none'
version: 0.1.3+3

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.36
  audio_waveforms: ^1.0.5
  flutter_slider_drawer: ^2.1.1
  ffmpeg_kit_flutter_new: ^3.2.0
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  health: ^13.2.1
  http: ^1.1.0
  dio: ^5.3.2
  uuid: ^4.0.0
  crypto: ^3.0.3
  flutter_dotenv: ^5.1.0
  share_plus: ^10.1.4
  file_picker: ^8.0.0
  just_audio_windows: ^0.2.2
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/audio/
    - assets/audio/background-audio/
    - assets/audio/background-music/
    - assets/audio/binaural/generated/relax/
    - assets/audio/binaural/generated/sleep/
    - assets/audio/binaural/generated/exercise/
    - assets/audio/binaural/generated/meditate/
    - assets/audio/binaural/generated/focus/
    - assets/audio/binaural/generated/study/
    - assets/audio/binaural/generated/anxiety relief/
    - assets/audio/binaural/generated/energy boost/
    - assets/json/
    - lib/schemas/